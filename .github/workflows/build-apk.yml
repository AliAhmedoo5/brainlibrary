name: Build & Release Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build Next.js static export
        run: npx next build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Android Debug APK
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Rename APK for Release
        run: |
          mkdir -p release-apk
          cp android/app/build/outputs/apk/debug/app-debug.apk release-apk/BrainLibrary-v1.0.apk

      - name: Publish Automatic GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-${{ github.run_number }}
          name: "Brain Library Android App v1.0"
          body: |
            ## 📱 Brain Library Native Android App (V1.0)
            Download and install **`BrainLibrary-v1.0.apk`** below directly onto your Android device!
            
            ### Installation Instructions:
            1. Download `BrainLibrary-v1.0.apk` from Assets below.
            2. Open on your Android phone and tap **Install**.
          files: release-apk/BrainLibrary-v1.0.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
